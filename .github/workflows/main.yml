on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install gdown
        run: python -m pip install gdown

      - name: Download JDK from Google Drive
        run: gdown --id 1lLp5lbEcBYa1xUkzHJnOrgZW-8MIoRms -O jdk-23_windows-x64_bin.msi

      - name: Install JDK
        run: |
          Start-Process -FilePath "jdk-23_windows-x64_bin.msi" -ArgumentList "/quiet /norestart" -Wait
        shell: pwsh

      - name: Verify Java Installation
        run: java -version

      - name: Set up Maven Wrapper
        run: |
          chmod +x mvnw
          ./mvnw -version
        shell: bash

      - name: Build Project with Maven
        run: |
          ./mvnw -Pprod,war clean verify
        shell: bash
